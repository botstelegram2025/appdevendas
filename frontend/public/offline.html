<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MARKIMAGEM TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .retry-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .retry-button:active {
            transform: translateY(0);
        }
        
        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .features h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .features ul {
            list-style: none;
            padding: 0;
        }
        
        .features li {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
        }
        
        .features li:before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .offline-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .offline-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            📡
        </div>
        
        <h1>Você está offline</h1>
        
        <p>
            Não conseguimos conectar à internet. 
            Verifique sua conexão e tente novamente.
        </p>
        
        <button class="retry-button" onclick="retry()">
            Tentar Novamente
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        
        <div class="features">
            <h3>💡 Enquanto isso...</h3>
            <ul>
                <li>Verifique se o Wi-Fi está ligado</li>
                <li>Confira se os dados móveis estão ativos</li>
                <li>Tente alternar entre Wi-Fi e 4G/5G</li>
                <li>Reinicie seu roteador se necessário</li>
            </ul>
        </div>
    </div>
    
    <script>
        function retry() {
            const button = document.querySelector('.retry-button');
            const loading = document.getElementById('loading');
            
            button.disabled = true;
            button.textContent = 'Verificando...';
            loading.style.display = 'block';
            
            // Tentar recarregar a página
            setTimeout(() => {
                if (navigator.onLine) {
                    window.location.href = '/';
                } else {
                    button.disabled = false;
                    button.textContent = 'Tentar Novamente';
                    loading.style.display = 'none';
                    alert('Ainda sem conexão. Tente novamente em alguns instantes.');
                }
            }, 1500);
        }
        
        // Detectar quando voltar online
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
        
        // Atualizar status da conexão
        window.addEventListener('load', () => {
            if (navigator.onLine) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
