# Configuração Nixpacks para Railway
# Este arquivo força o Railway a usar o Dockerfile.backend

[phases.setup]
nixPkgs = []

[phases.build]
cmds = ["echo 'Building with Dockerfile.backend'"]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8001}"

[variables]
NIXPACKS_DOCKERFILE = "Dockerfile.backend"
